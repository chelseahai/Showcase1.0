<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grasshopper Points — Floating Garment</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; background: #000; }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 0.75rem 1rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 10;
    }
    #status {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid #fff;
      flex-shrink: 0;
    }
    #status.connected { background: #fff; border-color: #fff; }
    #status.disconnected { background: transparent; }
    #received { font-size: 0.85rem; opacity: 0.9; }
    #fabricate-btn {
      margin-left: auto;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 4px;
      cursor: pointer;
    }
    #fabricate-btn:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
    #canvas { display: block; width: 100vw; height: 100vh; background: #000; }
  </style>
</head>
<body>
  <div id="ui">
    <span id="status" class="disconnected" aria-label="Disconnected"></span>
    <span id="received">—</span>
    <button type="button" id="fabricate-btn">Fabricate</button>
  </div>
  <canvas id="canvas"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    const WS_URL = "ws://127.0.0.1:9000";
    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("canvas");

    // ——— Scene: black background, subtle grid
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(2, 1.5, 2);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.5,
      0.4,
      0.45
    );
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const lineGroup = new THREE.Group();
    // Rhino/GH: front often faces "down" in their space. Rotate so front faces the camera (applies to every model).
    lineGroup.rotation.x = -Math.PI / 2;
    scene.add(lineGroup);

    let fabricateStartTime = null;
    const fabricateDuration = 22.5;
    let growthProgress = 1;

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      composer.setPixelRatio(renderer.getPixelRatio());
    }
    window.addEventListener("resize", onResize);

    function addLineFromFloats(floats) {
      const pointCount = floats.length / 3;
      const points = [];
      for (let i = 0; i < pointCount; i++) {
        points.push(new THREE.Vector3(
          floats[i * 3],
          floats[i * 3 + 1],
          floats[i * 3 + 2]
        ));
      }
      const curve = new THREE.CatmullRomCurve3(points, false);
      const sampled = curve.getPoints(pointCount);
      const smoothFloats = new Float32Array(sampled.length * 3);
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity, zMin = Infinity, zMax = -Infinity;
      for (let i = 0; i < sampled.length; i++) {
        const p = sampled[i];
        smoothFloats[i * 3] = p.x;
        smoothFloats[i * 3 + 1] = p.y;
        smoothFloats[i * 3 + 2] = p.z;
        if (p.x < xMin) xMin = p.x; if (p.x > xMax) xMax = p.x;
        if (p.y < yMin) yMin = p.y; if (p.y > yMax) yMax = p.y;
        if (p.z < zMin) zMin = p.z; if (p.z > zMax) zMax = p.z;
      }
      const extent = Math.max(xMax - xMin, yMax - yMin, zMax - zMin, 0.001);
      const geometry = new THREE.BufferGeometry().setFromPoints(sampled);
      const material = new THREE.LineBasicMaterial({
        color: 0xffffff,
        linewidth: 1.5
      });
      const line = new THREE.Line(geometry, material);
      line.userData.restPositions = smoothFloats;
      line.userData.zMin = zMin;
      line.userData.zMax = zMax;
      line.userData.extent = extent;
      lineGroup.add(line);
      return line;
    }

    // Motion: flowy drift + hem flutter + per-strand freq, tension weight, ripple
    const motion = {
      buoyantAmp: 0.04,
      flutterAmp: 0.035,
      hemPower: 0.55,
      strandFreqOffset: 0.012,
      rippleAmp: 0.0036,
      rippleWaves: 2.5,
      rippleFreq: 0.35,
      knitElasticity: 0.012,
      knitElasticityLag: 0.08,
      knitElasticityPower: 2
    };
    const TAU = Math.PI * 2;
    function flow(t, f1, f2, phase) {
      const a = 0.65 * Math.sin(TAU * f1 * t + phase);
      const b = 0.35 * Math.sin(TAU * f2 * t + phase * 1.7);
      return a + b;
    }
    function drift(t, f1, f2, f3, phase) {
      const a = 0.5 * Math.sin(TAU * f1 * t + phase);
      const b = 0.3 * Math.sin(TAU * f2 * t + phase * 2.1);
      const c = 0.2 * Math.sin(TAU * f3 * t + phase * 0.7);
      return a + b + c;
    }

    function updateMotion(time) {
      const t = time * 0.001;
      for (let i = 0; i < lineGroup.children.length; i++) {
        const line = lineGroup.children[i];
        const rest = line.userData.restPositions;
        if (!rest) continue;
        const posAttr = line.geometry.attributes.position;
        if (!posAttr) continue;
        const pos = posAttr.array;
        const useZ = line.userData.zMin !== undefined;
        const hemMin = useZ ? line.userData.zMin : line.userData.yMin;
        const hemMax = useZ ? line.userData.zMax : line.userData.yMax;
        const hemRange = (hemMax - hemMin) || 1;
        const scale = line.userData.extent || 1;
        const hemIdx = useZ ? 2 : 1;
        const ptCount = rest.length / 3;
        const sInv = ptCount > 1 ? 1 / (ptCount - 1) : 1;

        const bA = motion.buoyantAmp * scale;
        const fA = motion.flutterAmp * scale;
        const bf1 = 0.18 + i * motion.strandFreqOffset;
        const bf2 = 0.31 + i * (motion.strandFreqOffset * 1.5);
        const ff1 = 0.42 + i * motion.strandFreqOffset * 0.8;
        const ff2 = 0.59 + i * motion.strandFreqOffset * 1.2;
        const bx = bA * drift(t, 0.17, 0.29, 0.41, i * 0.5);
        const by = bA * drift(t, 0.23, 0.37, 0.53, i * 0.5 + 2.1);
        const bz = bA * drift(t, 0.13, 0.31, 0.47, i * 0.5 + 4.3);

        let sumX = 0, sumZ = 0;
        for (let j = 0; j < rest.length; j += 3) {
          sumX += rest[j];
          sumZ += rest[j + 2];
        }
        const centerX = sumX / ptCount;
        const centerZ = sumZ / ptCount;

        const rawElongation = Math.max(-1, Math.min(1, by / (bA || 1)));
        let smoothed = line.userData.smoothedElongation;
        if (smoothed === undefined) smoothed = 0;
        smoothed = smoothed * (1 - motion.knitElasticityLag) + rawElongation * motion.knitElasticityLag;
        line.userData.smoothedElongation = smoothed;
        const curved = Math.sign(smoothed) * Math.pow(Math.min(1, Math.abs(smoothed)), motion.knitElasticityPower);
        const baseKnit = motion.knitElasticity * curved;

        for (let j = 0; j < rest.length; j += 3) {
          const vi = j / 3;
          const s = vi * sInv;
          const tensionWeight = 0.8 + 0.2 * Math.sin(s * Math.PI);
          const h = rest[j + hemIdx];
          const hemT = (h - hemMin) / hemRange;
          const hemFactor = Math.pow(1 - hemT, motion.hemPower);
          const knitStrength = 0.6 + 0.4 * hemFactor;
          const elasticityFactor = 1 - baseKnit * knitStrength;

          const fx = tensionWeight * hemFactor * fA * flow(t, ff1, ff2, 0);
          const fy = tensionWeight * hemFactor * fA * flow(t, ff1, ff2, 0.7);
          const fz = tensionWeight * hemFactor * fA * flow(t, ff1, ff2, 1.5);

          const ripplePhase = TAU * (s * motion.rippleWaves - t * motion.rippleFreq);
          const rA = motion.rippleAmp * scale;
          const rx = rA * Math.sin(ripplePhase);
          const rz = rA * Math.sin(ripplePhase + 1.3);

          pos[j]     = rest[j]     + bx + fx + rx;
          pos[j + 1] = rest[j + 1] + by + fy;
          pos[j + 2] = rest[j + 2] + bz + fz + rz;

          const offX = pos[j] - centerX;
          const offZ = pos[j + 2] - centerZ;
          pos[j]     = centerX + offX * elasticityFactor;
          pos[j + 2] = centerZ + offZ * elasticityFactor;
        }
        if (growthProgress < 1) {
          const growthIndex = Math.min(ptCount - 1, Math.floor(growthProgress * ptCount));
          const gx = pos[growthIndex * 3];
          const gy = pos[growthIndex * 3 + 1];
          const gz = pos[growthIndex * 3 + 2];
          for (let vi = growthIndex + 1; vi < ptCount; vi++) {
            pos[vi * 3]     = gx;
            pos[vi * 3 + 1] = gy;
            pos[vi * 3 + 2] = gz;
          }
        }
        posAttr.needsUpdate = true;
      }
    }

    function centerCameraOnLines() {
      const box = new THREE.Box3().setFromObject(lineGroup);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 0.001);
      controls.target.copy(center);
      const dist = Math.max(maxDim * 1.8, 2);
      camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
      // Set near/far so the full scene is in view (no clipping)
      camera.near = Math.max(0.001, dist * 0.01);
      camera.far = dist * 10;
      camera.updateProjectionMatrix();
    }

    const rotateSpeed = 0.175;
    let lastTime = performance.now() / 1000;
    document.getElementById("fabricate-btn").addEventListener("click", () => {
      fabricateStartTime = performance.now() / 1000;
    });
    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now() / 1000;
      const dt = now - lastTime;
      lastTime = now;
      if (fabricateStartTime !== null) {
        growthProgress = Math.min(1, (now - fabricateStartTime) / fabricateDuration);
        if (growthProgress >= 1) fabricateStartTime = null;
      } else {
        growthProgress = 1;
      }
      lineGroup.rotation.z -= rotateSpeed * dt;
      updateMotion(performance.now());
      controls.update();
      composer.render(dt);
    }
    animate();

    // ——— WebSocket
    let ws;

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        statusEl.setAttribute("aria-label", "Connected");
        statusEl.className = "connected";
      };

      ws.onclose = () => {
        statusEl.setAttribute("aria-label", "Disconnected");
        statusEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {};

      ws.onmessage = async (event) => {
        let buffer;
        if (event.data instanceof ArrayBuffer) {
          buffer = event.data;
        } else if (event.data instanceof Blob) {
          buffer = await event.data.arrayBuffer();
        } else {
          console.log("Unexpected message type:", typeof event.data, event.data);
          return;
        }

        const floats = new Float32Array(buffer);
        if (floats.length % 3 !== 0) {
          console.warn("Float count is not multiple of 3. Packing mismatch.");
          return;
        }

        const pointCount = floats.length / 3;
        console.log("Binary message, byteLength:", buffer.byteLength, "points:", pointCount);
        console.log("First point:", floats[0], floats[1], floats[2]);

        while (lineGroup.children.length) {
          const line = lineGroup.children[0];
          lineGroup.remove(line);
          line.geometry.dispose();
          line.material.dispose();
        }
        addLineFromFloats(floats);
        centerCameraOnLines();

        const totalLines = lineGroup.children.length;
        document.getElementById("received").textContent =
          `${pointCount} points (this contour) · ${totalLines} contour(s) total`;
      };
    }

    connect();
  </script>
</body>
</html>
